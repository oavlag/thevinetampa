<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Missions Offering • Vine Tampa Church</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07111c;
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --line:rgba(255,255,255,.16);
      --gold:#f5b84b;
      --max:820px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      padding:18px;
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 10%, rgba(245,184,75,.28), transparent 35%),
        radial-gradient(circle at 20% 30%, rgba(0,150,180,.22), transparent 35%),
        radial-gradient(circle at 80% 70%, rgba(255,115,0,.20), transparent 40%),
        var(--bg);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:-30%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,185,72,.20), transparent 25%),
        radial-gradient(circle at 80% 20%, rgba(93,213,255,.15), transparent 28%),
        radial-gradient(circle at 50% 85%, rgba(255,111,0,.18), transparent 35%);
      filter:blur(45px);
      animation:lightMove 14s ease-in-out infinite alternate;
      pointer-events:none;
      z-index:0;
    }

    @keyframes lightMove{
      from{ transform:translate(-3%,-2%) scale(1); }
      to{ transform:translate(4%,5%) scale(1.08); }
    }

    .particles{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:1;
    }

    .particles span{
      position:absolute;
      bottom:-20px;
      width:5px;
      height:5px;
      border-radius:50%;
      background:rgba(255,255,255,.55);
      box-shadow:0 0 18px rgba(245,184,75,.75);
      animation:floatUp linear infinite;
      opacity:.55;
    }

    .particles span:nth-child(1){left:8%;animation-duration:17s;}
    .particles span:nth-child(2){left:18%;animation-duration:22s;animation-delay:2s;}
    .particles span:nth-child(3){left:30%;animation-duration:19s;animation-delay:4s;}
    .particles span:nth-child(4){left:44%;animation-duration:24s;animation-delay:1s;}
    .particles span:nth-child(5){left:56%;animation-duration:20s;animation-delay:5s;}
    .particles span:nth-child(6){left:68%;animation-duration:26s;animation-delay:3s;}
    .particles span:nth-child(7){left:80%;animation-duration:18s;animation-delay:6s;}
    .particles span:nth-child(8){left:92%;animation-duration:23s;animation-delay:2s;}

    @keyframes floatUp{
      0%{ transform:translateY(0) translateX(0) scale(.7); opacity:0; }
      15%{ opacity:.6; }
      50%{ transform:translateY(-50vh) translateX(28px) scale(1); }
      100%{ transform:translateY(-110vh) translateX(-22px) scale(.8); opacity:0; }
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      position:relative;
      z-index:2;
      width:100%;
      max-width:var(--max);
      margin:0 auto;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:34px;
      border:1px solid var(--line);
      box-shadow:0 24px 70px rgba(0,0,0,.48);
      background:#000;
    }

    .hero img{
      width:100%;
      display:block;
      height:auto;
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,.04),
          rgba(0,0,0,.02) 35%,
          rgba(0,0,0,.18) 100%
        );
      pointer-events:none;
      z-index:2;
    }

    .floating-giving{
      position:absolute;
      left:50%;
      top:51%;
      transform:translateX(-50%);
      width:100%;
      max-width:560px;
      padding:0 24px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      z-index:5;
    }

    .give-btn{
      position:relative;
      display:flex;
      align-items:center;
      gap:14px;
      padding:18px;
      border-radius:24px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.20);
      backdrop-filter:blur(28px) saturate(1.6);
      -webkit-backdrop-filter:blur(28px) saturate(1.6);
      box-shadow:
        0 18px 40px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.20);
      transition:.22s ease;
      overflow:hidden;
    }

    .give-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.16), transparent 55%);
      pointer-events:none;
    }

    .give-btn:hover{
      transform:translateY(-4px) scale(1.02);
      background:rgba(255,255,255,.20);
    }

    .give-icon{
      width:58px;
      height:58px;
      border-radius:18px;
      display:grid;
      place-items:center;
      font-size:28px;
      flex-shrink:0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 10px 20px rgba(0,0,0,.28);
      position:relative;
      z-index:1;
    }

    .zelle .give-icon{
      background:linear-gradient(135deg,#8b5cf6,#6d28d9);
    }

    .cardpay .give-icon{
      background:linear-gradient(135deg,#f59e0b,#b45309);
    }

    .give-text{
      display:flex;
      flex-direction:column;
      gap:4px;
      position:relative;
      z-index:1;
    }

    .give-text strong{
      font-size:18px;
      font-weight:800;
      color:white;
    }

    .give-text span{
      font-size:13px;
      color:rgba(255,255,255,.84);
      line-height:1.35;
    }

    .footer{
      padding:20px 10px 4px;
      text-align:center;
      color:rgba(255,255,255,.48);
      font-size:12px;
    }

    @media(max-width:640px){
      body{
        padding:12px;
      }

      .hero{
        border-radius:26px;
      }

      .floating-giving{
        top:47%;
        grid-template-columns:1fr;
        max-width:350px;
        gap:12px;
      }

      .give-btn{
        padding:15px;
        border-radius:22px;
      }

      .give-icon{
        width:52px;
        height:52px;
        font-size:25px;
      }

      .give-text strong{
        font-size:17px;
      }

      .give-text span{
        font-size:12px;
      }
    }

    @media(max-width:420px){
      .floating-giving{
        top:46%;
        max-width:320px;
      }

      .give-btn{
        padding:13px;
      }
    }

    @media(prefers-reduced-motion:reduce){
      body::before,
      .particles span{
        animation:none !important;
      }
    }
  </style>
</head>

<body>

  <div class="particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <main class="page">

    <section class="hero">

      <img src="https://www.thevinetampa.com/miss.png" alt="World Missions Offering - June 14, 2026">

      <div class="hero-overlay"></div>

      <div class="floating-giving">

        <a class="give-btn zelle"
           href="https://enroll.zellepay.com/qr-codes?data=eyJuYW1lIjoiVEhFIFZJTkUgVEFNUEEgRkFNSUxZIENPTU1VTklUWSBDSFVSQ0giLCJ0b2tlbiI6InplbGxlQHRoZXZpbmV0YW1wYS5jb20iLCJhY3Rpb24iOiJwYXltZW50In0="
           target="_blank"
           rel="noopener noreferrer">

          <div class="give-icon">💸</div>

          <div class="give-text">
            <strong>Zelle</strong>
            <span>zelle@thevinetampa.com</span>
          </div>

        </a>

        <a class="give-btn cardpay"
           href="https://square.link/u/ODwZXzmV"
           target="_blank"
           rel="noopener noreferrer">

          <div class="give-icon">💳</div>

          <div class="give-text">
            <strong>Card</strong>
            <span>Donate with card</span>
          </div>

        </a>

      </div>

    </section>

    <div class="footer">
      © 2026 The Vine Tampa Family Community Church
    </div>

  </main>

</body>
</html>
